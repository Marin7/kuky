name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: kuky_dev
          POSTGRES_USER: kuky
          POSTGRES_PASSWORD: kuky
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build and test
        working-directory: back-end
        run: |
          chmod +x gradlew
          ./gradlew build

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: front-end/package-lock.json

      - name: Install dependencies
        working-directory: front-end
        run: npm ci

      - name: Lint
        working-directory: front-end
        run: npm run lint

      - name: Build
        working-directory: front-end
        run: npm run build
        env:
          VITE_API_BASE_URL: https://api.kuky.es
          VITE_SITE_URL: https://kuky.es
