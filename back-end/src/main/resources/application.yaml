spring:
  application:
    name: kuky-backend

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver


  flyway:
    enabled: true
    locations: classpath:db/migration

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

server:
  port: 8081

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    expiry-seconds: 604800
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN}
  frontend:
    base-url: ${FRONTEND_BASE_URL}
  mail:
    from: ${MAIL_FROM:noreply@kuky.es}
  scheduling:
    teacher-timezone: Europe/Madrid
    teacher-email: ${TEACHER_EMAIL:noreply@kuky.es}
    day-start: "09:00"
    day-end: "18:00"
    class-duration-minutes: 60
    min-lead-hours: 24
    cancel-cutoff-hours: 24
  zoom:
    account-id: ${ZOOM_ACCOUNT_ID:}
    client-id: ${ZOOM_CLIENT_ID:}
    client-secret: ${ZOOM_CLIENT_SECRET:}
    user-id: ${ZOOM_USER_ID:me}