spring:
  application:
    name: kuky-backend

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 52MB

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver


  flyway:
    enabled: true
    locations: classpath:db/migration

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:true}
      mail.smtp.starttls.enable: ${MAIL_SMTP_STARTTLS:true}

server:
  port: 8081

app:
  cookie:
    secure: true
  jwt:
    secret: ${APP_JWT_SECRET}
    expiry-seconds: 604800
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN}
  frontend:
    base-url: ${FRONTEND_BASE_URL}
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:noreply@kuky.es}
  scheduling:
    teacher-timezone: Europe/Madrid
    teacher-email: ${TEACHER_EMAIL:noreply@kuky.es}
    class-duration-minutes: 60
    min-lead-hours: 24
    cancel-cutoff-hours: 24
  zoom:
    account-id: ${ZOOM_ACCOUNT_ID:}
    client-id: ${ZOOM_CLIENT_ID:}
    client-secret: ${ZOOM_CLIENT_SECRET:}
    user-id: ${ZOOM_USER_ID:me}