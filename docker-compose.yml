services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: kuky
      POSTGRES_USER: kuky
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kuky -d kuky"]
      interval: 10s
      timeout: 5s
      retries: 5

  back-end:
    build: ./back-end
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/kuky
      DB_USERNAME: kuky
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      APP_JWT_SECRET: ${APP_JWT_SECRET:?set APP_JWT_SECRET in .env}
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN:?set CORS_ALLOWED_ORIGIN in .env}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:?set FRONTEND_BASE_URL in .env}
      MAIL_HOST: ${MAIL_HOST:-localhost}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      MAIL_FROM: ${MAIL_FROM:-noreply@kuky.es}
      TEACHER_EMAIL: ${TEACHER_EMAIL:-noreply@kuky.es}
      ZOOM_ACCOUNT_ID: ${ZOOM_ACCOUNT_ID:-}
      ZOOM_CLIENT_ID: ${ZOOM_CLIENT_ID:-}
      ZOOM_CLIENT_SECRET: ${ZOOM_CLIENT_SECRET:-}
      ZOOM_USER_ID: ${ZOOM_USER_ID:-me}
    ports:
      - "8081:8081"

  front-end:
    build:
      context: ./front-end
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:?set VITE_API_BASE_URL in .env}
        VITE_SITE_URL: ${VITE_SITE_URL:?set VITE_SITE_URL in .env}
    restart: unless-stopped
    depends_on:
      - back-end
    ports:
      - "8080:8080"

volumes:
  postgres-data:
